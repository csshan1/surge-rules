name: Sync upstream Surge rules

on:
  schedule:
    - cron: "20 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync upstream rule files
        run: bash scripts/sync-upstream-rules.sh

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Sync upstream Surge rules
          file_pattern: rules/*.list
